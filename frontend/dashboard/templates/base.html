<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}SDLS Observability{% endblock %}</title>
  <link rel="icon" href="/favicon.ico" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

  <aside class="sidebar" id="sidebar">
    <!-- Brand -->
    <div class="sidebar-brand">
      <div class="brand-icon">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polygon points="20,4 36,32 4,32" fill="var(--accent)" opacity=".9"/>
          <circle cx="20" cy="12" r="4" fill="var(--danger)"/>
        </svg>
      </div>
      <div class="brand-text">
        <span class="brand-title">SDLS</span>
        <span class="brand-sub">Observability v3</span>
      </div>
      <button class="theme-toggle" id="themeToggle" title="Toggle theme">
        <span class="theme-icon">☀</span>
      </button>
    </div>

    <!-- Nav -->
    <nav class="sidebar-nav">
      <div class="nav-group-label">Monitoring</div>
      <a href="/" class="nav-item {% if active=='home' %}active{% endif %}">
        <svg class="nav-icon-svg" viewBox="0 0 20 20" fill="currentColor"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/></svg>
        <span>Dashboard</span>
      </a>
      <a href="/topology" class="nav-item {% if active=='topology' %}active{% endif %}">
        <svg class="nav-icon-svg" viewBox="0 0 20 20" fill="currentColor"><path d="M13 7H7v6h6V7z"/><path fill-rule="evenodd" d="M7 2a1 1 0 012 0v1h2V2a1 1 0 112 0v1h2a2 2 0 012 2v2h1a1 1 0 110 2h-1v2h1a1 1 0 110 2h-1v2a2 2 0 01-2 2h-2v1a1 1 0 11-2 0v-1H9v1a1 1 0 11-2 0v-1H5a2 2 0 01-2-2v-2H2a1 1 0 110-2h1V9H2a1 1 0 010-2h1V5a2 2 0 012-2h2V2zM5 5h10v10H5V5z" clip-rule="evenodd"/></svg>
        <span>Topology</span>
      </a>
      <a href="/logs" class="nav-item {% if active=='logs' %}active{% endif %}">
        <svg class="nav-icon-svg" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h8a1 1 0 110 2H4a1 1 0 01-1-1z" clip-rule="evenodd"/></svg>
        <span>Logs Viewer</span>
      </a>
      <a href="/analytics" class="nav-item {% if active=='analytics' %}active{% endif %}">
        <svg class="nav-icon-svg" viewBox="0 0 20 20" fill="currentColor"><path d="M2 11a1 1 0 011-1h2a1 1 0 011 1v5a1 1 0 01-1 1H3a1 1 0 01-1-1v-5zM8 7a1 1 0 011-1h2a1 1 0 011 1v9a1 1 0 01-1 1H9a1 1 0 01-1-1V7zM14 4a1 1 0 011-1h2a1 1 0 011 1v12a1 1 0 01-1 1h-2a1 1 0 01-1-1V4z"/></svg>
        <span>Analytics</span>
      </a>
      <a href="/errors" class="nav-item {% if active=='errors' %}active{% endif %}">
        <svg class="nav-icon-svg" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
        <span>Errors &amp; Alerts</span>
        <span class="nav-badge" id="errorBadge" style="display:none"></span>
      </a>

      <!-- Live nodes (populated by JS from Redis registry) -->
      <div class="nav-group-label" style="margin-top:16px">EC2 Nodes</div>
      <div id="nodeList" class="node-list">
        <div class="node-placeholder">Discovering…</div>
      </div>

      <!-- Live services (populated by JS) -->
      <div class="nav-group-label" style="margin-top:12px">Services</div>
      <div id="svcList" class="svc-list">
        <div class="node-placeholder">Loading…</div>
      </div>
    </nav>

    <div class="sidebar-footer">
      <div class="clock-wrap">
        <span class="clock-dot" id="globalDot"></span>
        <span id="utcClock" class="footer-clock">UTC --:--:--</span>
      </div>
      <div id="globalStatusText" class="footer-status-text">Connecting…</div>
      <a href="/logout" class="logout-btn">
        <svg viewBox="0 0 20 20" fill="currentColor" width="14" height="14"><path fill-rule="evenodd" d="M3 3a1 1 0 00-1 1v12a1 1 0 001 1h6a1 1 0 100-2H4V5h5a1 1 0 000-2H3zm11.293 4.293a1 1 0 011.414 1.414L14.414 10l1.293 1.293a1 1 0 01-1.414 1.414l-2-2a1 1 0 010-1.414l2-2z" clip-rule="evenodd"/><path d="M13 6a1 1 0 011 1v6a1 1 0 11-2 0V7a1 1 0 011-1z"/></svg>
        Logout
      </a>
    </div>
  </aside>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <main class="main" id="mainContent">
    <header class="topbar">
      <button class="hamburger" id="hamburger" aria-label="Toggle sidebar">
        <span></span><span></span><span></span>
      </button>
      <div class="topbar-breadcrumb">{% block breadcrumb %}Overview{% endblock %}</div>
      <div class="topbar-right">
        <div class="live-indicator">
          <span class="live-dot"></span>
          <span class="live-label">LIVE</span>
        </div>
        <div class="queue-pill" id="queuePill" title="Redis queue depth">Q: —</div>
      </div>
    </header>
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
  <script src="/static/js/app.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
