<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login · SDLS Observability</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
<script>
  (function(){
    var t = localStorage.getItem("sdls_theme") || "dark";
    document.documentElement.setAttribute("data-theme", t);
  })();
</script>
<div class="login-page">
  <div class="login-card">
    <div class="login-brand">
      <svg class="login-logo" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="48" height="48" rx="12" fill="var(--bg-sidebar)"/>
        <polygon points="24,8 40,38 8,38" fill="var(--accent)" opacity=".9"/>
        <circle cx="24" cy="16" r="4" fill="var(--danger)"/>
      </svg>
      <div class="login-title">SDLS Observability</div>
      <div class="login-sub">Distributed Microservices Platform v3</div>
    </div>

    {% if error %}
    <div class="form-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input class="form-input" id="username" name="username" type="text"
               autocomplete="username" placeholder="admin" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" id="password" name="password" type="password"
               autocomplete="current-password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="submit-btn">Sign In</button>
    </form>

    <div style="margin-top:16px;text-align:center;font-size:11px;color:var(--text-dim)">
      Session backed by Redis · 30-min sliding TTL
    </div>
  </div>
</div>
</body>
</html>
